name: Facebook Uploader Agent

on:
  schedule:
    # Runs 4 times a day at US peak engagement times (09:00, 12:00, 16:00, 20:00 EST)
    # Converted to UTC: 14:00, 17:00, 21:00, 01:00
    - cron: '0 1,14,17,21 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  upload_to_facebook:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Facebook Uploader Agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python agent_2_uploader.py
        
      - name: Commit Processed Messages State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update processed telegram messages"
          file_pattern: "output/processed_telegram_messages.txt"
